# Nginx: ahlan.uz -> Next.js. Barcha so'rovlar Node ga — bitta build, chunk 404 yo'q.
# Deploy: script avtomatik copy qiladi. Qo'lda: sudo cp deploy/nginx-ahlan.conf /etc/nginx/sites-available/ahlan && sudo nginx -t && sudo systemctl reload nginx

# HTTP -> HTTPS
server {
    listen 80;
    server_name ahlan.uz www.ahlan.uz;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name ahlan.uz www.ahlan.uz;
    client_max_body_size 10M;
    ssl_certificate /etc/letsencrypt/live/ahlan.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ahlan.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Static — Node dan, cache qilish (hash bor)
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    # Sahifalar — Node dan, hech qachon cache qilmaslik
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_no_cache 1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
}
