# Nginx: ahlan.uz -> Next.js (CSS/JS ham yuklanishi uchun barcha so'rovlar 3000 ga)
# Serverni qo'yish: sudo cp deploy/nginx-ahlan.conf /etc/nginx/sites-available/ahlan
# sudo ln -sf /etc/nginx/sites-available/ahlan /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name ahlan.uz www.ahlan.uz;
    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

