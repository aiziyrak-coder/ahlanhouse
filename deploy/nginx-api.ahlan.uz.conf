# api.ahlan.uz — Django (Gunicorn 8000)
# Serverni yangilash: sudo cp deploy/nginx-api.ahlan.uz.conf /etc/nginx/sites-available/api.ahlan.uz && sudo nginx -t && sudo systemctl reload nginx
# Static/media: ahlanhouse/ahlanApi (bitta loyiha)

server {
    server_name api.ahlan.uz;
    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /static/ {
        alias /var/www/ahlanhouse/ahlanApi/staticfiles/;
    }

    location /media/ {
        alias /var/www/ahlanhouse/ahlanApi/media/;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/ahlan.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ahlan.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = api.ahlan.uz) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name api.ahlan.uz;
    return 404;
}
